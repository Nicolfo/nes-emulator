name: CI

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lints:
    name: Lints (Fmt & Clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libudev-dev \
            libx11-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  test-and-build:
    name: Test and Build (${{ matrix.os }})
    needs: lints
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: nes-emulator-linux-x64
            binary_name: nes-emulator
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: nes-emulator-windows-x64
            binary_name: nes-emulator.exe
            archive_ext: zip
          - os: macos-latest
            target: universal-apple-darwin
            artifact_name: nes-emulator-macos-universal
            binary_name: nes-emulator
            archive_ext: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libgtk-3-dev \
            libudev-dev \
            libx11-dev \
            libxcb1-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target != 'universal-apple-darwin' && matrix.target || 'x86_64-apple-darwin,aarch64-apple-darwin' }}

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Run Tests
        run: cargo test --verbose

      - name: Download AccuracyCoin test ROM
        run: curl -L -o AccuracyCoin.nes https://github.com/100thCoin/AccuracyCoin/raw/main/AccuracyCoin.nes

      - name: Run AccuracyCoin suite
        run: cargo test --release --test accuracycoin_rom -- --nocapture

      # No explicit --target: the host triple matches matrix.target, and using
      # the default target dir shares the release artifacts already built by
      # the AccuracyCoin test step above.
      - name: Build Release (Linux / Windows)
        if: matrix.target != 'universal-apple-darwin'
        run: cargo build --release

      - name: Build Release (macOS Universal)
        if: matrix.target == 'universal-apple-darwin'
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          mkdir -p target/release
          lipo -create \
            -output target/release/nes-emulator \
            target/x86_64-apple-darwin/release/nes-emulator \
            target/aarch64-apple-darwin/release/nes-emulator

      # Packaging and artifact upload only on pushes; PRs stop after tests
      # and the release-build compile check.
      - name: Package Artifacts (Linux)
        if: github.event_name == 'push' && matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p ${{ matrix.artifact_name }}
          cp target/release/${{ matrix.binary_name }} ${{ matrix.artifact_name }}/
          cp README.md ${{ matrix.artifact_name }}/
          cp LICENSE ${{ matrix.artifact_name }}/
          cp docs/running-linux.md ${{ matrix.artifact_name }}/RUNNING.md
          # Launcher entry + icon + a no-root installer so the app shows up in
          # the desktop menu with its icon (the bare binary alone has none).
          cp assets/nes-emulator.desktop ${{ matrix.artifact_name }}/
          cp assets/icon.png ${{ matrix.artifact_name }}/nes-emulator.png
          cp assets/install-linux.sh ${{ matrix.artifact_name }}/install.sh
          chmod +x ${{ matrix.artifact_name }}/install.sh
          tar -czf ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} ${{ matrix.artifact_name }}

      - name: Package Artifacts (Windows)
        if: github.event_name == 'push' && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ${{ matrix.artifact_name }}
          Copy-Item "target\release\${{ matrix.binary_name }}" -Destination "${{ matrix.artifact_name }}\"
          Copy-Item "README.md" -Destination "${{ matrix.artifact_name }}\"
          Copy-Item "LICENSE" -Destination "${{ matrix.artifact_name }}\LICENSE.txt"
          Copy-Item "docs\running-windows.md" -Destination "${{ matrix.artifact_name }}\RUNNING.md"
          Compress-Archive -Path "${{ matrix.artifact_name }}" -DestinationPath "${{ matrix.artifact_name }}.${{ matrix.archive_ext }}"

      - name: Package Artifacts (macOS)
        if: github.event_name == 'push' && matrix.os == 'macos-latest'
        run: |
          mkdir -p ${{ matrix.artifact_name }}
          # Assemble a double-clickable .app bundle (Finder won't launch a bare
          # binary). The universal binary goes in Contents/MacOS.
          APP="${{ matrix.artifact_name }}/NES Emulator.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/release/${{ matrix.binary_name }} "$APP/Contents/MacOS/nes-emulator"
          # Stamp the bundle with the crate version so Info.plist never drifts
          # from Cargo.toml (the source of truth).
          VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          sed "s/__VERSION__/$VERSION/g" assets/Info.plist > "$APP/Contents/Info.plist"
          # Build a real multi-resolution .icns from the source PNG for the dock.
          mkdir icon.iconset
          for s in 16 32 128 256 512; do
            sips -z $s $s assets/icon.png --out "icon.iconset/icon_${s}x${s}.png" >/dev/null
            sips -z $((s*2)) $((s*2)) assets/icon.png --out "icon.iconset/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/icon.icns"
          # GPL: ship the license. Inside the bundle so it travels with the
          # .app, plus a top-level copy for users who never open the bundle.
          cp LICENSE "$APP/Contents/Resources/LICENSE"
          cp LICENSE ${{ matrix.artifact_name }}/
          cp README.md ${{ matrix.artifact_name }}/
          cp docs/running-macos.md ${{ matrix.artifact_name }}/RUNNING.md
          zip -ry ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} ${{ matrix.artifact_name }}

      - name: Upload Artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: test-and-build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
